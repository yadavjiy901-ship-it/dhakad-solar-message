<!DOCTYPE html>
<html lang="hi">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>
DHAKAD AGRO SOLAR SOLUTION CRM
</title>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:#eef2f7;
padding:14px;
color:#111827;
overflow-x:hidden;
}

header{
background:linear-gradient(135deg,#16a34a,#166534);
padding:22px;
border-radius:24px;
color:white;
margin-bottom:16px;
box-shadow:0 6px 18px rgba(0,0,0,0.12);
}

header h1{
font-size:24px;
font-weight:700;
}

header p{
margin-top:5px;
font-size:13px;
opacity:0.95;
}

.card{
background:white;
padding:16px;
border-radius:20px;
margin-bottom:14px;
box-shadow:0 4px 14px rgba(0,0,0,0.08);
}

input,
select{
width:100%;
padding:13px;
border-radius:14px;
border:1px solid #d1d5db;
font-size:14px;
margin-bottom:10px;
outline:none;
}

.main-btn{
width:100%;
padding:14px;
border:none;
border-radius:14px;
font-size:14px;
font-weight:700;
color:white;
cursor:pointer;
margin-top:8px;
}

.green{
background:#16a34a;
}

.black{
background:#111827;
}

.orange{
background:#ea580c;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:14px;
}

.stat-box{
background:white;
padding:16px;
border-radius:18px;
text-align:center;
font-weight:700;
box-shadow:0 4px 14px rgba(0,0,0,0.08);
cursor:pointer;
}

.customer{
background:white;
padding:16px;
border-radius:20px;
margin-bottom:14px;
box-shadow:0 4px 14px rgba(0,0,0,0.08);
}

.customer h3{
font-size:18px;
margin-bottom:10px;
}

.called-name{
color:#dc2626;
}

.info{
font-size:13px;
margin-bottom:6px;
word-break:break-word;
}

.buttons{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:8px;
margin-top:14px;
}

.btn{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:4px;
padding:10px;
border:none;
border-radius:16px;
color:white;
font-size:11px;
font-weight:600;
cursor:pointer;
min-height:72px;
}

.btn span{
font-size:22px;
}

.blue{
background:#2563eb;
}

.gray{
background:#6b7280;
}

.red{
background:#dc2626;
}

.doc-box{
margin-top:10px;
padding:10px;
background:#f3f4f6;
border-radius:14px;
font-size:13px;
}

.dark{
background:#111827;
color:white;
}

.dark .card,
.dark .customer,
.dark .stat-box{
background:#1f2937;
color:white;
}

</style>

</head>

<body>

<header>

<h1>
☀️ DHAKAD AGRO SOLAR SOLUTION
</h1>

<p>
Authorized Partner - Vijay Yadav
</p>

</header>

<!-- Upload -->

<div class="card">

<input
type="file"
id="excelFile"
accept=".xlsx,.xls">

<button
class="main-btn green"
onclick="loadExcel()">

📂 Upload Customer Data

</button>

<button
class="main-btn black"
onclick="toggleDarkMode()">

🌙 Dark Mode

</button>

</div>

<!-- Search -->

<div class="card">

<input
type="text"
id="searchBox"
placeholder="🔍 Search Customer"
onkeyup="renderCustomers()">

<select
id="villageFilter"
multiple
onchange="renderCustomers()"
style="height:160px;">

</select>

</div>

<!-- Vendor -->

<div class="card">

<h3 style="margin-bottom:10px;">
📨 Vendor Mobile
</h3>

<input
type="text"
id="vendorMobile"
placeholder="Vendor Mobile Number">

</div>

<!-- Stats -->

<div class="stats">

<div
class="stat-box"
onclick="changePage('main')">

👥 Main

<br><br>

<span id="mainCount">
0
</span>

</div>

<div
class="stat-box"
onclick="changePage('interested')">

✅ Interested

<br><br>

<span id="interestedCount">
0
</span>

</div>

<div
class="stat-box"
onclick="changePage('reject')">

❌ Reject

<br><br>

<span id="rejectCount">
0
</span>

</div>

<div
class="stat-box"
onclick="changePage('completed')">

📂 Complete

<br><br>

<span id="completedCount">
0
</span>

</div>

</div>

<!-- Customer List -->

<div id="customerList"></div>

<script>

let customers=[];
let interestedCustomers=[];
let rejectCustomers=[];
let completedCustomers=[];

let currentPage='main';

/* SAVE */

function saveData(){

localStorage.setItem(
'customers',
JSON.stringify(customers)
);

localStorage.setItem(
'interestedCustomers',
JSON.stringify(interestedCustomers)
);

localStorage.setItem(
'rejectCustomers',
JSON.stringify(rejectCustomers)
);

localStorage.setItem(
'completedCustomers',
JSON.stringify(completedCustomers)
);

}

/* LOAD */

function loadData(){

customers=
JSON.parse(localStorage.getItem('customers'))||[];

interestedCustomers=
JSON.parse(localStorage.getItem('interestedCustomers'))||[];

rejectCustomers=
JSON.parse(localStorage.getItem('rejectCustomers'))||[];

completedCustomers=
JSON.parse(localStorage.getItem('completedCustomers'))||[];

loadVillageFilter();

renderCustomers();

}

window.onload=loadData;

/* FIND COLUMN */

function findColumn(customer,keywords){

const keys=Object.keys(customer);

for(let key of keys){

const lower=key.toLowerCase();

for(let word of keywords){

if(lower.includes(word)){

return customer[key];

}

}

}

return '';

}

/* EXCEL */

function loadExcel(){

const file=
document.getElementById(
'excelFile'
).files[0];

if(!file){

alert('Select Excel File');

return;

}

const reader=new FileReader();

reader.onload=function(e){

const data=
new Uint8Array(e.target.result);

const workbook=
XLSX.read(data,{type:'array'});

const sheet=
workbook.Sheets[
workbook.SheetNames[0]
];

const imported=
XLSX.utils.sheet_to_json(sheet);

imported.forEach(c=>{

const mobile=
String(
findColumn(
c,
[
'mobile',
'phone',
'contact'
]
)
).replace(/\D/g,'');

const exists=
customers.some(old=>{

const oldMobile=
String(
findColumn(
old,
[
'mobile',
'phone',
'contact'
]
)
).replace(/\D/g,'');

return oldMobile===mobile;

});

if(!exists){

c.called=false;

c.notes='';

c.documents={
aadhaar:false,
pan:false,
sbi:false,
bill:false
};

customers.push(c);

}

});

saveData();

loadVillageFilter();

renderCustomers();

alert('Customer Imported');

};

reader.readAsArrayBuffer(file);

}

/* VILLAGE */

function loadVillageFilter(){

const select=
document.getElementById('villageFilter');

let villages=[];

customers.forEach(c=>{

const village=
String(
findColumn(
c,
[
'village',
'address'
]
)
).trim();

if(village &&
!villages.includes(village)){

villages.push(village);

}

});

select.innerHTML='';

villages.sort();

villages.forEach(v=>{

select.innerHTML+=
`<option value="${v}">
🏡 ${v}
</option>`;

});

}

/* PAGE */

function changePage(page){

currentPage=page;

renderCustomers();

}

/* RENDER */

function renderCustomers(){

const list=
document.getElementById('customerList');

const search=
document.getElementById('searchBox')
.value.toLowerCase();

let data=[];

if(currentPage==='main'){
data=customers;
}

if(currentPage==='interested'){
data=interestedCustomers;
}

if(currentPage==='reject'){
data=rejectCustomers;
}

if(currentPage==='completed'){
data=completedCustomers;
}

let html='';

data.forEach((customer,index)=>{

const name=
findColumn(
customer,
[
'consumer name',
'name'
]
)||'No Name';

const mobile=
findColumn(
customer,
[
'mobile',
'phone'
]
);

const village=
findColumn(
customer,
[
'village',
'address'
]
);

const consumer=
findColumn(
customer,
[
'consumer'
]
);

if(
!name.toLowerCase().includes(search)
&&
!String(mobile).includes(search)
){
return;
}

html+=`

<div class="customer">

<h3 class="${
customer.called ?
'called-name'
:
''
}">
👤 ${name}
</h3>

<div class="info">
📱 ${mobile}
</div>

<div class="info">
🏡 ${village}
</div>

<div class="info">
🔢 ${consumer}
</div>

<div class="doc-box">

☑ Aadhaar:
${customer.documents.aadhaar ? '✅':'❌'}

<br>

☑ PAN:
${customer.documents.pan ? '✅':'❌'}

<br>

☑ SBI:
${customer.documents.sbi ? '✅':'❌'}

<br>

☑ Bill:
${customer.documents.bill ? '✅':'❌'}

</div>

<div class="buttons">

<button
class="btn green"
onclick="callCustomer(${index})">

<span>📞</span>

<small>Call</small>

</button>

<button
class="btn blue"
onclick="sendWhatsapp(${index})">

<span>🟢</span>

<small>Msg</small>

</button>

<button
class="btn orange"
onclick="moveInterested(${index})">

<span>✅</span>

<small>Interest</small>

</button>

<button
class="btn gray"
onclick="moveReject(${index})">

<span>❌</span>

<small>Reject</small>

</button>

<button
class="btn black"
onclick="sendVendor(${index})">

<span>📨</span>

<small>Vendor</small>

</button>

<button
class="btn red"
onclick="deleteCustomer(${index})">

<span>🗑</span>

<small>Delete</small>

</button>

</div>

</div>

`;

});

list.innerHTML=html;

document.getElementById(
'mainCount'
).innerText=
customers.length;

document.getElementById(
'interestedCount'
).innerText=
interestedCustomers.length;

document.getElementById(
'rejectCount'
).innerText=
rejectCustomers.length;

document.getElementById(
'completedCount'
).innerText=
completedCustomers.length;

}

/* CALL */

function callCustomer(index){

customers[index].called=true;

saveData();

renderCustomers();

const mobile=
findColumn(
customers[index],
[
'mobile',
'phone'
]
);

window.location.href=
`tel:${mobile}`;

}

/* WHATSAPP */

function sendWhatsapp(index){

const customer=customers[index];

const name=
findColumn(
customer,
[
'consumer name',
'name'
]
);

const mobile=
String(
findColumn(
customer,
[
'mobile',
'phone'
]
)
).replace(/\D/g,'');

const text=
`श्रीमान ${name} जी 🙏

आपकी प्रधानमंत्री पीएम सूर्य घर योजना की रजिस्ट्रेशन प्रक्रिया जल्द पूर्ण की जाएगी।

कृपया आवश्यक दस्तावेज व्हाट्सएप पर भेजने का कष्ट करें।

☀️ DHAKAD AGRO SOLAR SOLUTION

📞 9183353063`;

window.open(
`https://wa.me/91${mobile}?text=${encodeURIComponent(text)}`,
'_blank'
);

}

/* INTEREST */

function moveInterested(index){

interestedCustomers.push(
customers[index]
);

customers.splice(index,1);

saveData();

renderCustomers();

}

/* REJECT */

function moveReject(index){

rejectCustomers.push(
customers[index]
);

customers.splice(index,1);

saveData();

renderCustomers();

}

/* DELETE */

function deleteCustomer(index){

if(confirm('Delete Customer?')){

customers.splice(index,1);

saveData();

renderCustomers();

}

}

/* VENDOR */

function sendVendor(index){

const vendor=
document.getElementById(
'vendorMobile'
).value;

if(!vendor){

alert('Enter Vendor Mobile');

return;

}

const customer=
customers[index];

const name=
findColumn(
customer,
[
'consumer name',
'name'
]
);

const mobile=
findColumn(
customer,
[
'mobile',
'phone'
]
);

const text=
`☀️ DHAKAD AGRO SOLAR SOLUTION

👤 ${name}

📱 ${mobile}

📄 Documents Ready`;

window.open(
`https://wa.me/91${vendor}?text=${encodeURIComponent(text)}`,
'_blank'
);

}

/* DARK MODE */

function toggleDarkMode(){

document.body.classList.toggle(
'dark'
);

}

</script>

</body>

</html>
