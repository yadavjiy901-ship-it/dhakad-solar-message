<!DOCTYPE html>
<html lang="hi">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
minimum-scale=1,
user-scalable=no">

<title>Dhakad Solar CRM</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:#eef2f7;
padding:16px;
overflow-x:hidden;
}

header{
background:linear-gradient(135deg,#16a34a,#15803d);
padding:35px 20px;
border-radius:30px;
color:white;
text-align:center;
margin-bottom:20px;
box-shadow:0 8px 24px rgba(0,0,0,0.15);
}

header h1{
font-size:34px;
font-weight:700;
margin-bottom:10px;
}

header p{
font-size:18px;
opacity:0.95;
}

.card{
background:white;
padding:24px;
border-radius:28px;
margin-bottom:20px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

input{
width:100%;
padding:18px;
border-radius:18px;
border:1px solid #d1d5db;
font-size:18px;
margin-bottom:16px;
outline:none;
}

.btn{
width:100%;
padding:18px;
border:none;
border-radius:20px;
font-size:19px;
font-weight:700;
color:white;
cursor:pointer;
margin-top:10px;
text-decoration:none;
display:block;
text-align:center;
}

.green{
background:#16a34a;
}

.blue{
background:#2563eb;
}

.orange{
background:#f59e0b;
}

.red{
background:#dc2626;
}

.black{
background:#111827;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:12px;
margin-bottom:20px;
}

.stat-box{
background:white;
padding:20px;
border-radius:24px;
text-align:center;
font-weight:700;
font-size:18px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
cursor:pointer;
}

.customer{
background:white;
padding:24px;
border-radius:28px;
margin-bottom:18px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.customer h3{
font-size:25px;
margin-bottom:14px;
}

.info{
font-size:18px;
margin-bottom:10px;
word-break:break-word;
}

.buttons{
display:grid;
gap:12px;
margin-top:18px;
}

</style>

</head>

<body>

<header>

<h1>
☀️ Dhakad Agro Solar
</h1>

<p>
Solar Customer CRM System
</p>

</header>

<!-- FILE -->

<div class="card">

<input
type="file"
id="excelFile"
accept=".xlsx,.xls">

<button
class="btn green"
onclick="loadExcel()">

📂 Upload Customer Data

</button>

</div>

<!-- SEARCH -->

<div class="card">

<input
type="text"
id="searchBox"
placeholder="🔍 Search Customer"
onkeyup="renderCustomers()">

</div>

<!-- STATS -->

<div class="stats">

<div
class="stat-box"
onclick="changePage('main')">

👥 Main

<br><br>

<span id="mainCount">
0
</span>

</div>

<div
class="stat-box"
onclick="changePage('called')">

📞 Called

<br><br>

<span id="calledCount">
0
</span>

</div>

<div
class="stat-box"
onclick="changePage('interested')">

✅ Interested

<br><br>

<span id="interestedCount">
0
</span>

</div>

</div>

<!-- DOWNLOAD -->

<button
class="btn orange"
onclick="downloadData()">

📥 Download Current Data

</button>

<!-- DELETE -->

<button
class="btn red"
onclick="clearMainData()">

🗑 Clear Main Data

</button>

<button
class="btn red"
onclick="clearCalledData()">

🗑 Clear Called Data

</button>

<button
class="btn red"
onclick="clearInterestedData()">

🗑 Clear Interested Data

</button>

<br><br>

<!-- CUSTOMER LIST -->

<div id="customerList"></div>

<script>

let customers=[];
let calledCustomers=[];
let interestedCustomers=[];
let currentPage='main';

/* SAVE */

function saveData(){

localStorage.setItem(
'mainCustomers',
JSON.stringify(customers)
);

localStorage.setItem(
'calledCustomers',
JSON.stringify(calledCustomers)
);

localStorage.setItem(
'interestedCustomers',
JSON.stringify(interestedCustomers)
);

}

/* LOAD */

function loadSavedData(){

customers =
JSON.parse(
localStorage.getItem(
'mainCustomers'
)
) || [];

calledCustomers =
JSON.parse(
localStorage.getItem(
'calledCustomers'
)
) || [];

interestedCustomers =
JSON.parse(
localStorage.getItem(
'interestedCustomers'
)
) || [];

renderCustomers();

}

document.addEventListener(
'DOMContentLoaded',
function(){

loadSavedData();

}
);

/* LOAD EXCEL */

function loadExcel(){

const file =
document.getElementById(
'excelFile'
).files[0];

if(!file){

alert('Select Excel File');

return;

}

const reader =
new FileReader();

reader.onload =
function(e){

const data =
new Uint8Array(
e.target.result
);

const workbook =
XLSX.read(
data,
{type:'array'}
);

const sheet =
workbook.Sheets[
workbook.SheetNames[0]
];

customers = [
...customers,
...XLSX.utils.sheet_to_json(sheet)
];

saveData();

renderCustomers();

};

reader.readAsArrayBuffer(file);

}

/* PAGE */

function changePage(page){

currentPage=page;

renderCustomers();

}

/* RENDER */

function renderCustomers(){

const list =
document.getElementById(
'customerList'
);

list.innerHTML='';

const search =
document.getElementById(
'searchBox'
).value.toLowerCase();

let data=[];

if(currentPage==='main'){
data=customers;
}

if(currentPage==='called'){
data=calledCustomers;
}

if(currentPage==='interested'){
data=interestedCustomers;
}

document.getElementById(
'mainCount'
).innerText =
customers.length;

document.getElementById(
'calledCount'
).innerText =
calledCustomers.length;

document.getElementById(
'interestedCount'
).innerText =
interestedCustomers.length;

const filtered =
data.filter(customer=>{

const name =
(
customer['Consumer Name Hindi']
||
customer['Consumer Name']
||
''
).toLowerCase();

const address =
(
customer['Address Hindi']
||
customer['Address']
||
''
).toLowerCase();

const mobile =
String(
customer['Mobile Number']
||
customer['Mobile No']
||
customer['Mobile']
||
''
);

const consumer =
String(
customer['Consumer Number']
||
customer['Consumer No']
||
customer['Service Number']
||
customer['Service No']
||
''
).toLowerCase();

return(

name.includes(search)
||
address.includes(search)
||
mobile.includes(search)
||
consumer.includes(search)

);

});

filtered.forEach((customer,index)=>{

const name =
customer['Consumer Name Hindi']
||
customer['Consumer Name']
||
'No Name';

const address =
customer['Address Hindi']
||
customer['Address']
||
'';

const mobile =
customer['Mobile Number']
||
customer['Mobile No']
||
customer['Mobile']
||
'';

const consumer =
customer['Consumer Number']
||
customer['Consumer No']
||
customer['Service Number']
||
customer['Service No']
||
'';

const purpose =
customer['Purpose']
||
'';

const load =
customer['Sanctioned Load']
||
'';

const units =
customer['Total Unit']
||
'';

const bill =
customer['Net Bill']
||
'';

let buttons='';

if(currentPage==='main'){

buttons = `

<a
href="tel:${mobile}"
class="btn green"
onclick="moveCalled(${index})">

📞 Call Now

</a>

<button
class="btn blue"
onclick="sendWhatsapp(${index})">

🟢 WhatsApp

</button>

<a
href="sms:${mobile}"
class="btn orange"
onclick="moveCalled(${index})">

✉️ Text SMS

</a>

`;

}

if(currentPage==='called'){

buttons = `

<button
class="btn blue"
onclick="moveInterested(${index})">

✅ Move to Interested

</button>

`;

}

if(currentPage==='interested'){

buttons = `

<a
href="tel:${mobile}"
class="btn black">

📞 Call Customer

</a>

<button
class="btn orange"
onclick="sendDocuments(${index})">

📄 Send Document Details

</button>

`;

}

list.innerHTML += `

<div class="customer">

<h3>
👤 ${name}
</h3>

<div class="info">
📱 Mobile: ${mobile}
</div>

<div class="info">
🔢 Consumer No: ${consumer}
</div>

<div class="info">
🏠 Address: ${address}
</div>

<div class="info">
⚡ Purpose: ${purpose}
</div>

<div class="info">
🔌 Sanctioned Load: ${load}
</div>

<div class="info">
📊 Total Unit: ${units}
</div>

<div class="info">
💰 Net Bill: ₹${bill}
</div>

<div class="buttons">

${buttons}

</div>

</div>

`;

});

}

/* MOVE CALLED */

function moveCalled(index){

const customer =
customers[index];

calledCustomers.push(customer);

customers.splice(index,1);

saveData();

renderCustomers();

}

/* WHATSAPP */

function sendWhatsapp(index){

const customer =
customers[index];

const name =
customer['Consumer Name']
||
customer['Consumer Name Hindi']
||
'';

const mobile =
customer['Mobile No']
||
customer['Mobile Number']
||
'';

const text =
`🌞 नमस्कार ${name} जी,

अब अपने घर पर जीरो इन्वेस्टमेंट में सोलर सिस्टम लगवाने का शानदार अवसर।`;

window.open(
`https://wa.me/91${mobile}?text=${encodeURIComponent(text)}`,
'_blank'
);

moveCalled(index);

}

/* INTERESTED */

function moveInterested(index){

const customer =
calledCustomers[index];

interestedCustomers.push(customer);

calledCustomers.splice(index,1);

saveData();

renderCustomers();

}

/* DOCUMENTS */

function sendDocuments(index){

const customer =
interestedCustomers[index];

const name =
customer['Consumer Name']
||
customer['Consumer Name Hindi']
||
'';

const mobile =
customer['Mobile No']
||
customer['Mobile Number']
||
'';

const text =
`नमस्कार ${name} जी 🙏

कृपया दस्तावेज तैयार रखें।`;

window.open(
`https://wa.me/91${mobile}?text=${encodeURIComponent(text)}`,
'_blank'
);

}

/* DOWNLOAD */

function downloadData(){

let data=[];

if(currentPage==='main'){
data=customers;
}

if(currentPage==='called'){
data=calledCustomers;
}

if(currentPage==='interested'){
data=interestedCustomers;
}

if(data.length===0){

alert('No Data');

return;

}

const worksheet =
XLSX.utils.json_to_sheet(data);

const workbook =
XLSX.utils.book_new();

XLSX.utils.book_append_sheet(
workbook,
worksheet,
currentPage
);

XLSX.writeFile(
workbook,
`${currentPage}_customers.xlsx`
);

}

/* DELETE */

function clearMainData(){

if(confirm('Delete Main Data?')){

customers=[];

saveData();

renderCustomers();

}

}

function clearCalledData(){

if(confirm('Delete Called Data?')){

calledCustomers=[];

saveData();

renderCustomers();

}

}

function clearInterestedData(){

if(confirm('Delete Interested Data?')){

interestedCustomers=[];

saveData();

renderCustomers();

}

}

</script>

</body>
</html>
